name: Deploy App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy to EC2
      uses: appleboy/ssh-action@master
      with:
        host: 13.61.187.115
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          cd week7-cicd/app
          git pull
          sudo docker stop $(sudo docker ps -q) || true
          sudo docker rm $(sudo docker ps -aq) || true
          sudo docker build -t week7-app .
          sudo docker run -d -p 8080:80 week7-app
